passwordResetSubject=Tilbakestill passord for matrikkelbruker
passwordResetBody=Hei,\nDu har mottatt denne e-posten fordi det er gjort en foresp\u00F8rsel om passordbytte p\u00E5 {4} i miljřet {2} for Matrikkelen.\nEn slik foresp\u00F8rsel skjer enten ved at du selv har initiert den gjennom matrikkelklienten eller at kundesenteret har initiert det for deg.\nKlikk p\u00E5 denne lenken for \u00E5 bytte passord: {0}. Lenken er gyldig i {3}.\n\nDersom du ikke \u00F8nsker \u00E5 bytte passord kan du ignorere denne foresp\u00F8rselen.\n\nTrenger du hjelp, har sp\u00F8rsm\u00E5l knyttet til hvordan du bytter passord eller ikke har initiert passordbytte, s\u00E5 kan du kontakte Kartverkets kundesenter p\u00E5 matrikkelhjelp@kartverket.no\n\nVennlig hilsen\nKartverket\n
passwordResetBodyHtml=<div style="font-family: sans-serif;"><p>Hei,</p><p>Du har mottatt denne e-posten fordi det er gjort en foresp\u00F8rsel om passordbytte p\u00E5 {4} i miljřet {2} for Matrikkelen.</p><p>En slik foresp\u00F8rsel skjer enten ved at du selv har initiert den gjennom matrikkelklienten eller at kundesenteret har initiert det for deg.</p><p>Klikk p\u00E5 <a href="{0}">denne</a> lenken for \u00E5 bytte passord. Lenken er gyldig i {3}.</p><p></p><p>Dersom du ikke \u00F8nsker \u00E5 bytte passord kan du ignorere denne foresp\u00F8rselen.</p><p></p><p>Trenger du hjelp, har sp\u00F8rsm\u00E5l knyttet til hvordan du bytter passord eller ikke har initiert passordbytte, s\u00E5 kan du kontakte Kartverkets kundesenter p\u00E5 matrikkelhjelp@kartverket.no</p><p></p><p>Vennlig hilsen</p><p>Kartverket</p></div>

