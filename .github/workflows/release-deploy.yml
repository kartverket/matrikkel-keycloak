name: Release and deploy to dev
on:
  push:
    branches: [ main ]

jobs:
  build:
    permissions:
      contents: write
      packages: write
      security-events: write
      actions: read
    uses: ./.github/workflows/build.yml
    with:
      create_git_tag: true
      push_docker_image: true
    secrets: inherit

  pharos:
    name: Run Pharos security scan
    needs: build
    permissions:
      actions: read
      packages: read
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - name: "Run Pharos"
        uses: kartverket/pharos@v0.3.1
        with:
          image_url: ${{ needs.build.outputs.image_url }}
          allow_severity_level: critical

  deploy-dev:
    needs: [ pharos, build ]
    uses: kartverket/heimdall-apps/.github/workflows/release-app.yml@main
    with:
      namespace: matrikkel-keycloak-dev
      application: matrikkel-keycloak
      version: ${{ needs.build.outputs.version }}
      deploy_dev: true
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN_RW_REPO_PACKAGES }}


  build-scheduler:
    permissions:
      contents: write
      packages: write
      security-events: write
      actions: read
    uses: ./.github/workflows/build-scheduler.yml
    with:
      create_git_tag: true
      push_docker_image: true
    secrets: inherit

  pharos-scheduler:
    name: Run Pharos security scan
    needs: build-scheduler
    permissions:
      actions: read
      packages: read
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - name: "Run Pharos"
        uses: kartverket/pharos@v0.3.1
        with:
          image_url: ${{ needs.build-scheduler.outputs.image_url }}
          allow_severity_level: critical

  deploy-dev-scheduler:
    needs: [ pharos-scheduler, build-scheduler ]
    uses: kartverket/heimdall-apps/.github/workflows/release-app.yml@main
    with:
      namespace: matrikkel-keycloak-dev
      application: matrikkel-keycloak-scheduler
      version: ${{ needs.build-scheduler.outputs.version }}
      deploy_dev: true
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN_RW_REPO_PACKAGES }}
