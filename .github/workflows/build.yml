name: Build

on:
  push:
    branches-ignore:
      - main
  workflow_call:
    inputs:
      push_docker_image:
        description: "Push docker image to ghcr?"
        default: false
        type: boolean
      create_git_tag:
        description: "Create tag on current commit?"
        default: false
        type: boolean
    outputs:
      version:
        description: "The version of the docker-image created"
        value: ${{ jobs.build.outputs.new_tag }}
      image_url:
        description: "The full URL to the docker-image created"
        value: ${{ jobs.build.outputs.image_url }}

env:
  registry: ghcr.io
  image_name: kartverket/matrikkel-keycloak

jobs:
  build:
    name: Build and publish docker image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      security-events: write
      actions: read
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
      image_url: ${{ steps.setOutput.outputs.image_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run integration tests with Gradle Wrapper
        working-directory: ./extensions
        run: ./gradlew integrationTest

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: ${{ inputs.create_git_tag == false }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        id: build_and_push
        uses: docker/build-push-action@v5.3.0
        with:
          context: .
          file: Dockerfile
          push: ${{ inputs.push_docker_image == true }}
          tags: ${{ env.registry }}/${{ env.image_name }}:${{ steps.tag_version.outputs.new_tag }},${{ env.registry }}/${{ env.image_name }}:latest

      - name: Set output with build values
        id: setOutput
        run: |
          echo "image_url=${{ env.registry }}/${{ env.image_name }}@${{ steps.build_and_push.outputs.digest }}" >> $GITHUB_OUTPUT
