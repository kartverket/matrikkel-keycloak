name: Deploy to All Environments

on:
  push:
  workflow_dispatch:

env:
  CI: true
  TZ: Europe/Oslo
  SLACK_CHANNEL: C04SQEX2858
  DEV_CLUSTER_NAME: atkv3-dev-user-cluster
  DEV_KUBERNETES_PROJECT_ID: kubernetes-dev-94b9
  DEV_SERVICE_ACCOUNT: matrikkel-deploy@matrikkel-dev-fd36.iam.gserviceaccount.com
  DEV_WORKLOAD_IDENTITY_PROVIDER: projects/422604778482/locations/global/workloadIdentityPools/matrikkel-deploy-pool/providers/github-provider
  PROD_CLUSTER_NAME: atkv3-prod-user-cluster
  PROD_KUBERNETES_PROJECT_ID: kubernetes-prod-e4a2
  PROD_SERVICE_ACCOUNT: matrikkel-deploy@matrikkel-prod-91b2.iam.gserviceaccount.com
  PROD_WORKLOAD_IDENTITY_PROVIDER: projects/367207507054/locations/global/workloadIdentityPools/matrikkel-deploy-pool/providers/github-provider

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version-string.outputs.version }}
      image: ${{ steps.version-string.outputs.image }}
      schedulerImage: ${{ steps.version-string.outputs.schedulerImage }}

    steps:
      - name: Generate version string
        id: version-string
        shell: bash
        run: |
          version="$(date -u '+%Y.%m.%d-%H.%M')-$(echo "${GITHUB_SHA}" | cut -c1-7)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/kartverket/matrikkel-keycloak:${version}" >> "$GITHUB_OUTPUT"
          echo "schedulerImage=ghcr.io/kartverket/matrikkel-keycloak-scheduler:${version}" >> "$GITHUB_OUTPUT"

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          architecture: x64
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Run tests
        working-directory: ./extensions
        run: ./gradlew integrationTest

  package-image:
    name: Build and (conditionally) Push Docker Image
    runs-on: ubuntu-latest
    needs:
      - version
      - test
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Docker image
        uses: docker/build-push-action@v7
        env:
          image: ${{ needs.version.outputs.image }}
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.image }}
      - name: Tag commit med artifaktversjon
        run: |
          git tag ${{ needs.version.outputs.version }}
          git push origin ${{ needs.version.outputs.version }}

  package-scheduler-image:
    name: Build and (conditionally) Push Docker SchedulerImage
    runs-on: ubuntu-latest
    needs:
      - version
      - test
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v7
        env:
          image: ${{ needs.version.outputs.schedulerImage }}
        with:
          context: skipJobbScheduler/
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.image }}

  pharos:
    name: Run Pharos
    if: ${{ github.ref == 'refs/heads/main' }}
    needs:
      - package-image
      - package-scheduler-image
    uses: ./.github/workflows/sikkerhetsscanning_images.yml

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs:
      - version
      - package-image
      - package-scheduler-image
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Deploy matrikkel-keycloak to dev
        uses: kartverket/matrikkel-actions/apps-repo-deploy@main
        env:
          version: ${{ needs.version.outputs.version }}
        with:
          apps: |
            atkv3-dev:matrikkel-keycloak-dev:matrikkel-keycloak:${{ env.version }}
            atkv3-dev:matrikkel-keycloak-dev:matrikkel-keycloak-scheduler:${{ env.version }}
      - name: Verify deployment to dev
        uses: kartverket/matrikkel-actions/k8s-deployment-feedback@main
        with:
          cluster: ${{ env.DEV_CLUSTER_NAME }}
          apps: |
            matrikkel-keycloak-dev:keycloak:${{ needs.version.outputs.version }}
          includeStatefulSets: 'true'
          kubernetes_project_id: ${{ env.DEV_KUBERNETES_PROJECT_ID }}
          service_account: ${{ env.DEV_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ env.DEV_WORKLOAD_IDENTITY_PROVIDER }}

  deploy-qa:
    name: Deploy to QA
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs:
      - version
      - package-image
      - package-scheduler-image
      - deploy-dev
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Deploy matrikkel-keycloak to QA environments
        uses: kartverket/matrikkel-actions/apps-repo-deploy@main
        env:
          version: ${{ needs.version.outputs.version }}
        with:
          apps: |
            atkv3-prod:matrikkel-keycloak-betatest:matrikkel-keycloak:${{ env.version }}
            atkv3-prod:matrikkel-keycloak-betatest:matrikkel-keycloak-scheduler:${{ env.version }}
      - name: Verify deployment to QA
        uses: kartverket/matrikkel-actions/k8s-deployment-feedback@main
        with:
          cluster: ${{ env.PROD_CLUSTER_NAME }}
          apps: |
            matrikkel-keycloak-betatest:keycloak:${{ needs.version.outputs.version }}
          includeStatefulSets: 'true'
          kubernetes_project_id: ${{ env.PROD_KUBERNETES_PROJECT_ID }}
          service_account: ${{ env.PROD_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ env.PROD_WORKLOAD_IDENTITY_PROVIDER }}

  deploy-prod-notifier:
    name: Slack Notify; Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs:
      - version
      - package-image
      - package-scheduler-image
      - pharos
      - deploy-qa
    outputs:
      messageId: ${{ steps.slack_notify.outputs.messageId }}
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Notify slack (Setup)
        id: slack_notify
        uses: kartverket/matrikkel-actions/slack-approval-notifier/setup-octo@main
        with:
          channel: ${{ env.SLACK_CHANNEL }}
          environment: 'produksjon'
          appDescriptor: atkv3-prod:matrikkel-keycloak-prod:matrikkel-keycloak:${{ needs.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs:
      - version
      - deploy-prod-notifier
    environment:
      name: production
    permissions:
      actions: read
      contents: read
      id-token: write

    steps:
      - name: Notify slack (Update)
        uses: kartverket/matrikkel-actions/slack-approval-notifier/update-octo@main
        with:
          channel: ${{ env.SLACK_CHANNEL }}
          environment: 'produksjon'
          appDescriptor: atkv3-prod:matrikkel-keycloak-prod:matrikkel-keycloak:${{ needs.version.outputs.version }}
          messageId: ${{ needs.deploy-prod-notifier.outputs.messageId }}
          status: ${{ job.status }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      - name: Deploy matrikkel-keycloak to production
        uses: kartverket/matrikkel-actions/apps-repo-deploy@main
        env:
          version: ${{ needs.version.outputs.version }}
        with:
          apps: |
            atkv3-prod:matrikkel-keycloak-prod:matrikkel-keycloak:${{ env.version }}
            atkv3-prod:matrikkel-keycloak-prod:matrikkel-keycloak-scheduler:${{ env.version }}
      - name: Verify deployment to production
        if: false # Disabler sjekken her mens vi venter på at vi kan skru på auto-sync i argo
        uses: kartverket/matrikkel-actions/k8s-deployment-feedback@main
        with:
          cluster: ${{ env.PROD_CLUSTER_NAME }}
          apps: |
            matrikkel-keycloak-prod:keycloak:${{ needs.version.outputs.version }}
          includeStatefulSets: 'true'
          kubernetes_project_id: ${{ env.PROD_KUBERNETES_PROJECT_ID }}
          service_account: ${{ env.PROD_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ env.PROD_WORKLOAD_IDENTITY_PROVIDER }}
